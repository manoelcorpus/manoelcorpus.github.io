<!DOCTYPE html>
<html lang="pt-BR">

        <div class="info">
            <h3>Sobre mim</h3>
            <p>Criador de conteúdo, apaixonado por futebol, rádio web e projetos criativos. Aqui você encontra tudo o que preparo com carinho!</p>
